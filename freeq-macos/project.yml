name: freeq-macos
options:
  bundleIdPrefix: at.freeq
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  freeq-macos:
    type: application
    platform: macOS
    sources:
      - path: freeq-macos
        type: group
      - path: Generated/freeq.swift
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: at.freeq.macos
        PRODUCT_NAME: freeq
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
        INFOPLIST_KEY_CFBundleDisplayName: freeq
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS:
          - "-framework"
          - "Security"
          - "-framework"
          - "SystemConfiguration"
          - "-framework"
          - "AuthenticationServices"
        CLANG_ENABLE_MODULES: YES
    dependencies:
      - framework: FreeqSDK.xcframework
    entitlements:
      path: freeq-macos/freeq-macos.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
