name: freeq
options:
  bundleIdPrefix: at.freeq
  deploymentTarget:
    iOS: "18.0"

targets:
  freeq:
    type: application
    platform: iOS
    sources:
      - path: freeq
        excludes:
          - Info.plist
      - path: Generated/freeq.swift
      - path: freeqShared
    info:
      path: freeq/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: AccentColor
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "freeq needs camera access to take photos and videos to share in chat."
        NSMicrophoneUsageDescription: "freeq needs microphone access to record voice messages and video with audio."
        NSPhotoLibraryUsageDescription: "freeq needs photo library access to share photos and videos in chat."
        NSSpeechRecognitionUsageDescription: "freeq transcribes your voice messages on-device so they're searchable and accessible. The audio never leaves your phone for transcription."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        CFBundleURLTypes:
          - CFBundleURLName: at.freeq.auth
            CFBundleURLSchemes:
              - freeq
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: at.freeq.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: 3DT7XF7L4R
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        OTHER_LDFLAGS:
          - "-ObjC"
    dependencies:
      - framework: FreeqSDK.xcframework
        embed: false
      - sdk: AVFAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreAudio.framework
      - sdk: Network.framework
      - sdk: Security.framework
      - sdk: WatchConnectivity.framework
      # - target: freeqLiveActivity   # temporarily disabled until provisioning is set up in Xcode
      # - target: freeqWatch
      #   embed: true

  freeqLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: freeqLiveActivity
      - path: freeqShared
    info:
      path: freeqLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: freeq Live Activity
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: at.freeq.ios.liveactivity
        DEVELOPMENT_TEAM: 3DT7XF7L4R
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework

  freeqWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: freeqWatch
      - path: freeqShared
    info:
      path: freeqWatch/Info.plist
      properties:
        CFBundleDisplayName: freeq
        WKApplication: true
        WKWatchOnly: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: at.freeq.ios.watchkitapp
        DEVELOPMENT_TEAM: 3DT7XF7L4R
        CODE_SIGN_STYLE: Automatic
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WatchKit.framework
      - sdk: WatchConnectivity.framework

  freeqTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: freeqTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: at.freeq.ios.tests
        DEVELOPMENT_TEAM: 3DT7XF7L4R
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    dependencies:
      - target: freeq
