<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>freeq call</title>
  <script type="module" crossorigin src="/av/assets/publish-0_tfMLVg.js"></script>
  <script type="module" crossorigin src="/av/assets/watch-CQEo0ml-.js"></script>
  <link rel="modulepreload" crossorigin href="/av/assets/time-Do1uKez-.js">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #111; color: #eee;
      display: flex; flex-direction: column;
      align-items: center; padding: 1.5rem; gap: 1rem;
      min-height: 100vh;
    }
    h1 { color: #58a6ff; font-size: 1.2rem; }
    .status { color: #8b949e; font-size: 0.85rem; text-align: center; }
    .status.error { color: #f85149; }
    .controls { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    button {
      padding: 0.5rem 1.2rem; border: none; border-radius: 6px;
      font-size: 0.9rem; cursor: pointer; color: white;
    }
    .btn-mute { background: #238636; }
    .btn-mute.muted { background: #da3633; }
    .btn-leave { background: #6e7681; }
    .btn-leave:hover { background: #da3633; }
    .hidden { display: none; }
    #landing { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    #landing input {
      padding: 0.5rem 0.8rem; border: 1px solid #444; border-radius: 6px;
      background: #222; color: #eee; font-size: 0.9rem; width: 200px;
    }
    #landing button { background: #238636; }
    .audio-indicator {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; border-radius: 8px; background: #1a1a2e;
    }
    .audio-indicator .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #238636;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <h1>freeq call</h1>

  <!-- Landing: enter name to join -->
  <div id="landing">
    <p class="status">Enter your name to join the call</p>
    <form id="join-form" style="display:flex;gap:0.5rem;">
      <input id="nick-input" placeholder="Your name" autofocus />
      <button type="submit">Join</button>
    </form>
  </div>

  <!-- Call: active -->
  <div id="call" class="hidden">
    <p class="status" id="call-status">Connecting...</p>
    <div class="audio-indicator hidden" id="audio-indicator">
      <span class="dot"></span>
      <span id="audio-label">Audio active</span>
    </div>
    <div class="controls">
      <button class="btn-mute" id="btn-mute">Mute</button>
      <button class="btn-leave" id="btn-leave">Leave</button>
    </div>
  </div>

  <!-- MoQ publish element — source set dynamically after join -->
  <moq-publish id="publish" style="display:none"></moq-publish>
  <!-- MoQ watch element — audio only, no canvas needed -->
  <moq-watch id="watch" jitter="100"></moq-watch>

  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const session = params.get('session') || 'default';
    const presetNick = params.get('nick') || '';
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const moqOrigin = `${wsProtocol}//${window.location.host}/av/moq`;

    const landing = document.getElementById('landing');
    const call = document.getElementById('call');
    const callStatus = document.getElementById('call-status');
    const nickInput = document.getElementById('nick-input');
    const publish = document.getElementById('publish');
    const watch = document.getElementById('watch');
    const btnMute = document.getElementById('btn-mute');
    const btnLeave = document.getElementById('btn-leave');
    const audioIndicator = document.getElementById('audio-indicator');
    const audioLabel = document.getElementById('audio-label');

    if (presetNick) nickInput.value = presetNick;
    if (presetNick) joinCall(presetNick);

    document.getElementById('join-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const nick = nickInput.value.trim();
      if (nick) joinCall(nick);
    });

    async function joinCall(nick) {
      landing.classList.add('hidden');
      call.classList.remove('hidden');
      callStatus.textContent = `Joining as ${nick}...`;
      callStatus.classList.remove('error');

      // Request microphone only (no video for voice calls)
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        console.error('Could not get microphone:', e);
        const reason = e.name === 'NotAllowedError' ? 'permission denied — allow microphone access and retry'
          : e.name === 'NotFoundError' ? 'no microphone found'
          : e.message;
        callStatus.textContent = `Microphone error: ${reason}`;
        callStatus.classList.add('error');
        return;
      }

      // Set up MoQ publish — "camera" source captures audio+video via the component
      // (the moq-publish component doesn't support a "microphone"-only source)
      const pubName = `${session}/${nick}`;
      publish.setAttribute('url', moqOrigin);
      publish.setAttribute('name', pubName);
      publish.setAttribute('source', 'camera');
      console.log('[call] Publishing:', pubName, 'to', moqOrigin);

      // Set up MoQ watch — subscribe to session namespace
      watch.setAttribute('url', moqOrigin);
      watch.setAttribute('name', session);
      console.log('[call] Watching:', session);

      // Monitor connection state — check if MoQ elements connected
      callStatus.textContent = `Connecting to voice server...`;
      let connected = false;

      // Poll for connection (MoQ web components don't expose events reliably)
      const checkConnection = setInterval(() => {
        // If the publish element has a URL and hasn't errored, consider it connected
        if (publish.getAttribute('url') && !connected) {
          connected = true;
          clearInterval(checkConnection);
          callStatus.textContent = `Connected as ${nick}`;
          audioIndicator.classList.remove('hidden');
          audioLabel.textContent = 'Audio active';
        }
      }, 500);

      // Timeout after 10s
      setTimeout(() => {
        if (!connected) {
          clearInterval(checkConnection);
          callStatus.textContent = 'Connection timed out — voice server may be unavailable';
          callStatus.classList.add('error');
        }
      }, 10000);
    }

    let muted = false;
    btnMute.addEventListener('click', () => {
      muted = !muted;
      if (muted) {
        publish.muted = true;
        btnMute.textContent = 'Unmute';
        btnMute.classList.add('muted');
        audioLabel.textContent = 'Muted';
      } else {
        publish.muted = false;
        btnMute.textContent = 'Mute';
        btnMute.classList.remove('muted');
        audioLabel.textContent = 'Audio active';
      }
    });

    btnLeave.addEventListener('click', () => {
      publish.setAttribute('source', '');
      publish.setAttribute('url', '');
      watch.setAttribute('url', '');
      window.close();
    });
  </script>
</body>
</html>
